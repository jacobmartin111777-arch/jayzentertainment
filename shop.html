<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop – Jay'z RC Car Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --red: #e63946; --red-dark: #c1121f; --black: #0d0d0d; --dark: #1a1a1a; --gray: #2d2d2d; --light: #f4f4f4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--black); color: var(--light); min-height: 100vh; }
    header { background: linear-gradient(180deg, var(--red) 0%, var(--red-dark) 100%); padding: 1.25rem 1.5rem; text-align: center; box-shadow: 0 4px 20px rgba(230,57,70,0.3); }
    header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; letter-spacing: 0.05em; }
    header p { font-size: 1rem; opacity: 0.95; margin-top: 0.25rem; }
    nav { background: var(--dark); padding: 0.75rem 1rem; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--red); }
    nav a { color: var(--light); margin: 0 1rem; text-decoration: none; font-weight: 600; font-size: 1.05rem; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--red); }
    .cart-trigger { position: fixed; top: 1rem; right: 1rem; background: var(--red); color: white; border: none; padding: 0.6rem 1rem; border-radius: 8px; font-family: inherit; font-weight: 600; cursor: pointer; z-index: 101; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 4px 12px rgba(230,57,70,0.4); transition: transform 0.2s, background 0.2s; }
    .cart-trigger:hover { background: var(--red-dark); transform: scale(1.05); }
    .cart-trigger .count { background: var(--black); color: var(--red); padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.9rem; }
    .page-hero { padding: 2rem 1.5rem; text-align: center; background: var(--dark); border-bottom: 3px solid var(--red); }
    .page-hero h2 { font-family: 'Orbitron', sans-serif; font-size: 1.75rem; margin-bottom: 0.5rem; }
    .section { padding: 2rem 1.5rem; max-width: 1200px; margin: 0 auto; }
    .filter-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; }
    .filter-bar button { background: var(--gray); border: 1px solid var(--gray); color: var(--light); padding: 0.5rem 1rem; border-radius: 8px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-bar button:hover, .filter-bar button.active { background: var(--red); border-color: var(--red); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .card { background: var(--dark); border-radius: 12px; overflow: hidden; border: 1px solid var(--gray); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(230,57,70,0.2); border-color: var(--red); }
    .card-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: var(--gray); }
    .card-body { padding: 1rem; }
    .card .tag { font-size: 0.75rem; color: var(--red); text-transform: uppercase; margin-bottom: 0.25rem; }
    .card h3 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin-bottom: 0.35rem; }
    .card .price { color: var(--red); font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; }
    .card .desc { font-size: 0.9rem; opacity: 0.85; margin-bottom: 0.75rem; line-height: 1.35; }
    .card button { width: 100%; background: var(--red); border: none; padding: 0.6rem 1rem; color: white; font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
    .card button:hover { background: var(--red-dark); }
    footer { background: var(--black); padding: 1.25rem; text-align: center; border-top: 1px solid var(--gray); color: #888; font-size: 0.9rem; }
    footer a { color: #aaa; margin: 0 0.5rem; text-decoration: none; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    .cart-overlay.open { opacity: 1; visibility: visible; }
    .cart-drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 380px; height: 100%; background: var(--dark); z-index: 201; box-shadow: -4px 0 24px rgba(0,0,0,0.5); transform: translateX(100%); transition: transform 0.3s; display: flex; flex-direction: column; }
    .cart-drawer.open { transform: translateX(0); }
    .cart-drawer-header { padding: 1.25rem; border-bottom: 2px solid var(--gray); display: flex; justify-content: space-between; align-items: center; }
    .cart-drawer-header h3 { font-family: 'Orbitron', sans-serif; font-size: 1.25rem; }
    .cart-drawer-close { background: none; border: none; color: var(--light); font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    .cart-drawer-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-item { display: flex; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--gray); }
    .cart-item img { width: 70px; height: 52px; object-fit: cover; border-radius: 6px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; margin-bottom: 0.25rem; }
    .cart-item-price { color: var(--red); font-size: 0.9rem; }
    .cart-item-qty { display: flex; align-items: center; gap: 0.35rem; margin-top: 0.35rem; }
    .cart-item-qty button { width: 26px; height: 26px; border: none; background: var(--gray); color: white; border-radius: 4px; cursor: pointer; font-size: 1rem; line-height: 1; }
    .cart-item-qty button:hover { background: var(--red); }
    .cart-item-qty span { min-width: 1.5rem; text-align: center; }
    .cart-item-remove { background: none; border: none; color: #888; cursor: pointer; font-size: 1.1rem; padding: 0.25rem; }
    .cart-item-remove:hover { color: var(--red); }
    .cart-drawer-footer { padding: 1rem 1.25rem; border-top: 2px solid var(--gray); }
    .cart-total { font-family: 'Orbitron', sans-serif; font-size: 1.25rem; margin-bottom: 1rem; }
    .cart-total span { color: var(--red); }
    #paypal-button-container { min-height: 45px; }
    .cart-empty { text-align: center; padding: 2rem 1rem; color: #888; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal { background: var(--dark); border-radius: 12px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--red); box-shadow: 0 16px 48px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.3s; position: relative; }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 12px 12px 0 0; }
    .modal-body { padding: 1.25rem; }
    .modal-body h3 { font-family: 'Orbitron', sans-serif; font-size: 1.35rem; margin-bottom: 0.5rem; }
    .modal-body .price { color: var(--red); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    .modal-body .desc { line-height: 1.5; margin-bottom: 1rem; opacity: 0.9; }
    .modal-close { position: absolute; top: 0.75rem; right: 0.75rem; background: rgba(0,0,0,0.6); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.25rem; line-height: 1; }
    .modal-close:hover { background: var(--red); }
    .no-results { text-align: center; padding: 2rem; color: #888; font-size: 1.1rem; }
  </style>
</head>
<body>

  <header>
    <h1>Jay'z RC Car Shop</h1>
    <p>High Speed RC Cars & Racing Gear</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html" class="active">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button class="cart-trigger" type="button" onclick="toggleCart()" aria-label="Open cart">🛒 Cart <span class="count" id="cart-count">0</span></button>

  <section class="page-hero">
    <h2>Shop All RC Cars</h2>
    <p>Browse by category or explore everything we have in stock.</p>
  </section>

  <section class="section">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="grid" id="product-grid"></div>
    <p class="no-results" id="no-results" style="display:none;">No products in this category yet. Check back soon!</p>
  </section>

  <footer>
    <a href="index.html">Home</a> <a href="shop.html">Shop</a> <a href="about.html">About</a> <a href="contact.html">Contact</a>
    <br><br>© 2026 Jay'z Entertainment
  </footer>

  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h3>Your Cart</h3>
      <button class="cart-drawer-close" type="button" onclick="toggleCart()" aria-label="Close">&times;</button>
    </div>
    <div class="cart-drawer-body" id="cart-items"></div>
    <div class="cart-drawer-footer" id="cart-footer" style="display:none;">
      <div class="cart-total">Total: <span id="cart-total">$0</span></div>
      <div id="paypal-button-container"></div>
    </div>
  </div>

  <div class="modal-overlay" id="product-modal" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <button class="modal-close" type="button" onclick="closeModal()" aria-label="Close">&times;</button>
      <img id="modal-image" src="" alt="">
      <div class="modal-body">
        <h3 id="modal-title"></h3>
        <div class="price" id="modal-price"></div>
        <p class="desc" id="modal-desc"></p>
        <button type="button" onclick="addFromModal()">Add to Cart</button>
      </div>
    </div>
  </div>

  <script>
    const products = [
      { id: 1, name: "Speed Racer", price: 120, category: "on-road", desc: "1:14 scale electric buggy. 25+ mph, 30 min run time. Perfect for parking lot racing.", image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=300&fit=crop" },
      { id: 2, name: "Off Road Beast", price: 180, category: "off-road", desc: "4WD monster truck. Water-resistant, big tires, handles grass and dirt like a champ.", image: "https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=400&h=300&fit=crop" },
      { id: 3, name: "Mini Drift Car", price: 90, category: "drift", desc: "1:28 scale drift machine. Low center of gravity, smooth slides on any surface.", image: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=300&fit=crop" },
      { id: 4, name: "Monster Truck RC", price: 210, category: "monster", desc: "Large scale 1:10 monster truck. Brushless motor, 40+ mph. Built for jumps and stunts.", image: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=400&h=300&fit=crop" },
      { id: 5, name: "Rally Pro", price: 150, category: "rally", desc: "Rally-style sedan. Great on pavement and light off-road. Adjustable suspension.", image: "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400&h=300&fit=crop" },
      { id: 6, name: "Crawler King", price: 199, category: "crawler", desc: "Rock crawler with slow, precise control. Scale details and tough chassis.", image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400&h=300&fit=crop" },
      { id: 7, name: "Street Racer GT", price: 165, category: "on-road", desc: "1:10 on-road touring car. Low profile, high grip. Ideal for parking lot tracks.", image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=300&fit=crop" },
      { id: 8, name: "Mud Slayer", price: 195, category: "off-road", desc: "Heavy-duty off-road truck. Sealed electronics, huge clearance. Conquer any terrain.", image: "https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=400&h=300&fit=crop" },
      { id: 9, name: "Drift Master Pro", price: 220, category: "drift", desc: "Competition-grade drift chassis. Adjustable camber and toe. Ready for the track.", image: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&h=300&fit=crop" },
      { id: 10, name: "Brute Force", price: 245, category: "monster", desc: "1:8 scale monster truck. Metal gears, oil-filled shocks. Built to last.", image: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=400&h=300&fit=crop" },
      { id: 11, name: "Trail Scout", price: 175, category: "crawler", desc: "Scale trail truck. Realistic looks, capable on rocks and trails.", image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400&h=300&fit=crop" },
      { id: 12, name: "LiPo Battery Pack 2S", price: 35, category: "accessories", desc: "7.4V 2S LiPo, 5000mAh. Compatible with most 1:10 vehicles.", image: "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400&h=300&fit=crop" },
      { id: 13, name: "Charger Pro", price: 55, category: "accessories", desc: "Dual-channel LiPo charger. Balance charge, storage mode, LCD display.", image: "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400&h=300&fit=crop" },
      { id: 14, name: "Spare Tire Set", price: 28, category: "accessories", desc: "Set of 4 off-road tires with inserts. Fits most 1:10 wheels.", image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=300&fit=crop" }
    ];

    const categories = [
      { id: 'all', label: 'All' },
      { id: 'on-road', label: 'On-Road' },
      { id: 'off-road', label: 'Off-Road' },
      { id: 'drift', label: 'Drift' },
      { id: 'monster', label: 'Monster Truck' },
      { id: 'crawler', label: 'Crawler' },
      { id: 'rally', label: 'Rally' },
      { id: 'accessories', label: 'Accessories' }
    ];

    const CART_KEY = 'jays_rc_cart';
    let cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
    let modalProductId = null;
    let currentFilter = 'all';

    function saveCart() {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateCartUI();
    }

    function getProduct(id) {
      return products.find(p => p.id === id);
    }

    function addToCart(id) {
      const product = getProduct(id);
      if (!product) return;
      const existing = cart.find(item => item.id === id);
      if (existing) existing.qty++;
      else cart.push({ id, qty: 1, name: product.name, price: product.price, image: product.image });
      saveCart();
    }

    function addFromModal() {
      if (modalProductId) addToCart(modalProductId);
      closeModal();
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      saveCart();
    }

    function changeQty(id, delta) {
      const item = cart.find(item => item.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty < 1) removeFromCart(id);
      else saveCart();
    }

    function updateCartUI() {
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById("cart-count").textContent = count;
      const body = document.getElementById("cart-items");
      const footer = document.getElementById("cart-footer");
      if (cart.length === 0) {
        body.innerHTML = '<p class="cart-empty">Your cart is empty.<br>Add some RC cars!</p>';
        footer.style.display = "none";
        return;
      }
      footer.style.display = "block";
      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      document.getElementById("cart-total").textContent = "$" + total.toFixed(2);
      body.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">$${item.price} × ${item.qty}</div>
            <div class="cart-item-qty">
              <button type="button" onclick="changeQty(${item.id}, -1)">−</button>
              <span>${item.qty}</span>
              <button type="button" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
          </div>
          <button class="cart-item-remove" type="button" onclick="removeFromCart(${item.id})" aria-label="Remove">×</button>
        </div>
      `).join("");
    }

    function toggleCart() {
      document.getElementById("cart-overlay").classList.toggle("open");
      document.getElementById("cart-drawer").classList.toggle("open");
    }

    function openModal(id) {
      const p = getProduct(id);
      if (!p) return;
      modalProductId = id;
      document.getElementById("modal-image").src = p.image;
      document.getElementById("modal-image").alt = p.name;
      document.getElementById("modal-title").textContent = p.name;
      document.getElementById("modal-price").textContent = "$" + p.price;
      document.getElementById("modal-desc").textContent = p.desc;
      document.getElementById("product-modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("product-modal").classList.remove("open");
      modalProductId = null;
    }

    function setFilter(id) {
      currentFilter = id;
      document.querySelectorAll('.filter-bar button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === id);
      });
      renderProducts();
    }

    function renderFilters() {
      const bar = document.getElementById("filter-bar");
      bar.innerHTML = categories.map(c => `
        <button type="button" data-filter="${c.id}" class="${c.id === 'all' ? 'active' : ''}" onclick="setFilter('${c.id}')">${c.label}</button>
      `).join("");
    }

    function renderProducts() {
      const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
      document.getElementById("no-results").style.display = filtered.length === 0 ? "block" : "none";
      const grid = document.getElementById("product-grid");
      grid.innerHTML = filtered.map(p => {
        const catLabel = categories.find(c => c.id === p.category)?.label || '';
        return `
        <div class="card" onclick="openModal(${p.id})">
          <img class="card-image" src="${p.image}" alt="${p.name}">
          <div class="card-body">
            <span class="tag">${catLabel}</span>
            <h3>${p.name}</h3>
            <div class="price">$${p.price}</div>
            <p class="desc">${p.desc}</p>
            <button type="button" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button>
          </div>
        </div>
      `;
      }).join("");
    }

    renderFilters();
    renderProducts();
    updateCartUI();
    if (window.location.hash === '#cart') setTimeout(toggleCart, 100);
  </script>

  <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
  <script>
    (function() {
      function renderPayPal() {
        if (typeof paypal === "undefined") return;
        const container = document.getElementById("paypal-button-container");
        if (!container || container.hasAttribute("data-rendered")) return;
        const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
        if (total < 0.01) return;
        paypal.Buttons({
          createOrder: function(data, actions) {
            return actions.order.create({
              purchase_units: [{ amount: { value: total.toFixed(2), currency: "USD" } }]
            });
          },
          onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
              alert("Thank you! Payment completed.");
              cart = [];
              saveCart();
              toggleCart();
            });
          }
        }).render("#paypal-button-container");
        container.setAttribute("data-rendered", "true");
      }
      const origUpdate = updateCartUI;
      updateCartUI = function() {
        origUpdate();
        const c = document.getElementById("paypal-button-container");
        if (c) { c.innerHTML = ""; c.removeAttribute("data-rendered"); }
        setTimeout(renderPayPal, 100);
      };
    })();
  </script>
</body>
</html>
